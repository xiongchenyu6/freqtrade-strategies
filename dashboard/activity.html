<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📡 活动归档 — KOL / DCA / 情绪 / 期权</title>
<style>
  body { background:#0d1117; color:#c9d1d9; margin:0; padding:0;
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; line-height:1.55; }
  .topbar { background:#161b22; border-bottom:1px solid #30363d;
            padding:10px 24px; font-size:13px;
            display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:0; z-index:10; }
  .topbar a { color:#58a6ff; text-decoration:none; margin-right:16px; }
  .container { max-width:1100px; margin:0 auto; padding:24px 20px 80px; }
  h1 { color:#58a6ff; font-size:26px; margin:0 0 6px; }
  h2 { color:#f0f6fc; font-size:16px; margin:24px 0 12px;
       border-bottom:1px solid #21262d; padding-bottom:6px; }
  .subtitle { color:#8b949e; font-size:13px; margin-bottom:14px; }

  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
           gap:10px; margin:14px 0 24px; }
  .stat { background:#161b22; border:1px solid #30363d; border-left:4px solid #58a6ff;
          padding:10px 14px; border-radius:6px; }
  .stat .label { color:#8b949e; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
  .stat .value { color:#f0f6fc; font-size:20px; font-weight:600; margin-top:2px;
                 font-family:ui-monospace,monospace; }

  .filter-bar { display:flex; gap:8px; flex-wrap:wrap; align-items:center;
                margin-bottom:16px; padding:10px;
                background:#161b22; border:1px solid #30363d; border-radius:6px; }
  .filter-bar label { color:#8b949e; font-size:12px; margin-right:4px; }
  .pill-btn { background:#21262d; color:#c9d1d9; border:1px solid #30363d;
              padding:5px 12px; border-radius:14px; cursor:pointer; font-size:12px;
              font-family:inherit; }
  .pill-btn:hover { background:#30363d; }
  .pill-btn.active { background:#238636; border-color:#238636; color:#fff; }
  .search { background:#0d1117; border:1px solid #30363d; color:#c9d1d9;
            padding:5px 10px; border-radius:4px; font-size:13px;
            margin-left:auto; min-width:200px; }
  .search:focus { outline:none; border-color:#58a6ff; }

  .event { background:#161b22; border:1px solid #30363d; border-radius:6px;
           padding:10px 14px; margin:8px 0; display:grid;
           grid-template-columns:auto 1fr auto; gap:12px; align-items:start; }
  .event:hover { border-color:#58a6ff; }
  .event-icon { font-size:18px; line-height:1; padding-top:2px; }
  .event-main { min-width:0; }
  .event-title { color:#f0f6fc; font-size:13px; font-weight:500;
                 overflow:hidden; text-overflow:ellipsis; }
  .event-meta { color:#8b949e; font-size:11px; margin-top:3px;
                font-family:ui-monospace,monospace; }
  .event-time { color:#6e7681; font-size:11px; white-space:nowrap;
                font-family:ui-monospace,monospace; text-align:right; }
  .score { display:inline-block; padding:1px 6px; border-radius:3px;
           font-family:ui-monospace,monospace; font-size:11px; margin-right:6px; }
  .score.pos { background:#0d4429; color:#3fb950; }
  .score.neg { background:#3a0d0d; color:#f85149; }
  .score.neu { background:#2d2d2d; color:#d29922; }
  .empty { background:#161b22; border:1px dashed #30363d; border-radius:6px;
           padding:30px; text-align:center; color:#8b949e; font-size:13px; }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <a href="/">🏠 主页</a>
    <a href="/dashboard/overview.html">🎯 系统总览</a>
    <a href="/dashboard/index.html">DCA Dashboard</a>
  </div>
  <span style="color:#6e7681">dashboard/activity.html</span>
</div>
<div class="container">
  <h1>📡 活动归档</h1>
  <div class="subtitle">
    汇总 Supabase 4 张表的历史事件 — 这些是系统过去 X 天推送过的 Telegram 消息 / 决策记录。
    <b>事件越多 = 系统越活跃</b>，越少 = 市场安静。
  </div>

  <div class="stats" id="stats"></div>

  <div class="filter-bar">
    <label>类型：</label>
    <button class="pill-btn active" data-filter="all">All</button>
    <button class="pill-btn" data-filter="kol">🗞️ KOL</button>
    <button class="pill-btn" data-filter="dca">💰 DCA</button>
    <button class="pill-btn" data-filter="sentiment">📰 Sentiment</button>
    <button class="pill-btn" data-filter="deribit">📊 Options</button>
    <input class="search" type="text" placeholder="搜索标题 / KOL / 关键字…"
           oninput="currentSearch=this.value.toLowerCase(); render();">
  </div>

  <div id="list"></div>
</div>

<script>
const SUPABASE_URL = 'https://rhweqsxothaezsbxjwaj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RRSWxhXvvaUqk3S9nF7m9A_loMqoxxw';
const LIMIT_PER_TABLE = 200;

let allEvents = [];
let currentFilter = 'all';
let currentSearch = '';

async function fetchTable(name) {
  try {
    const r = await fetch(
      `${SUPABASE_URL}/rest/v1/${name}?select=*&order=timestamp.desc&limit=${LIMIT_PER_TABLE}`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!r.ok) return [];
    return await r.json();
  } catch { return []; }
}

function normalizeKOL(r) {
  const score = r.score ?? 0;
  return {
    ts: r.timestamp, type: 'kol',
    icon: score > 0.2 ? '🟢' : (score < -0.2 ? '🔴' : '🟡'),
    title: r.title || '',
    meta: `${r.kol || '?'} · score ${score.toFixed(2)} · ${r.source || ''}`,
    raw: r,
  };
}
function normalizeDCA(r) {
  return {
    ts: r.timestamp, type: 'dca',
    icon: r.multiplier > 1.5 ? '🔥' : r.multiplier < 0.5 ? '🧊' : '💰',
    title: `DCA 建议 ${r.multiplier?.toFixed?.(2)}× = $${Math.round(r.amount_usdt)} ` +
           `(${r.mode})`,
    meta: `FnG ${r.fng_value} · cycle ${r.cycle_score?.toFixed?.(2)} ` +
          `· ${r.cycle_signal || ''}${r.order_result ? ' · BUY' : ''}`,
    raw: r,
  };
}
function normalizeSentiment(r) {
  const s = r.combined_score ?? 0;
  return {
    ts: r.timestamp, type: 'sentiment',
    icon: s > 0.2 ? '📈' : (s < -0.2 ? '📉' : '➡️'),
    title: `情绪快照 · ${r.signal || ''} (combined ${s.toFixed(2)})`,
    meta: `FnG ${r.fng_value} (${r.fng_classification}) · KOL ${r.kol_score?.toFixed?.(2)} ` +
          `(${r.kol_mentions} 条) · keyword ${r.keyword_sentiment?.toFixed?.(2)}`,
    raw: r,
  };
}
function normalizeDeribit(r) {
  const top = (r.top_candidates || [])[0];
  return {
    ts: r.timestamp, type: 'deribit',
    icon: '📊',
    title: top
      ? `期权扫描 · ${r.total_candidates} 候选 · top: strike $${top.strike} ` +
        `exp ${top.expiry} annualized ${((top.annualized_yield || 0) * 100).toFixed(1)}%`
      : `期权扫描 · 0 候选`,
    meta: `BTC spot $${r.spot_price?.toFixed?.(0)}`,
    raw: r,
  };
}

async function loadAll() {
  document.getElementById('list').innerHTML =
    '<div class="empty">从 Supabase 拉取中…</div>';
  const [kol, dca, sent, deribit] = await Promise.all([
    fetchTable('kol_events').then(rs => rs.map(normalizeKOL)),
    fetchTable('dca_log').then(rs => rs.map(normalizeDCA)),
    fetchTable('sentiment_snapshots').then(rs => rs.map(normalizeSentiment)),
    fetchTable('deribit_snapshots').then(rs => rs.map(normalizeDeribit)),
  ]);
  allEvents = [...kol, ...dca, ...sent, ...deribit]
    .filter(e => e.ts)
    .sort((a, b) => b.ts.localeCompare(a.ts));
  renderStats(kol.length, dca.length, sent.length, deribit.length);
  render();
}

function renderStats(k, d, s, o) {
  const total = k + d + s + o;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="label">总事件</div><div class="value">${total}</div></div>
    <div class="stat" style="border-left-color:#f0883e">
      <div class="label">KOL 告警</div><div class="value">${k}</div></div>
    <div class="stat" style="border-left-color:#3fb950">
      <div class="label">DCA 决策</div><div class="value">${d}</div></div>
    <div class="stat" style="border-left-color:#d29922">
      <div class="label">情绪快照</div><div class="value">${s}</div></div>
    <div class="stat" style="border-left-color:#8957e5">
      <div class="label">期权扫描</div><div class="value">${o}</div></div>
  `;
}

function render() {
  const filtered = allEvents.filter(e => {
    if (currentFilter !== 'all' && e.type !== currentFilter) return false;
    if (currentSearch) {
      const blob = `${e.title} ${e.meta} ${JSON.stringify(e.raw)}`.toLowerCase();
      if (!blob.includes(currentSearch)) return false;
    }
    return true;
  });

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">没有匹配事件</div>';
    return;
  }

  list.innerHTML = filtered.slice(0, 500).map(e => `
    <div class="event" data-type="${e.type}">
      <div class="event-icon">${e.icon}</div>
      <div class="event-main">
        <div class="event-title">${escapeHTML(e.title)}</div>
        <div class="event-meta">${escapeHTML(e.meta)}</div>
      </div>
      <div class="event-time">${fmtTime(e.ts)}</div>
    </div>
  `).join('');
  if (filtered.length > 500) {
    list.insertAdjacentHTML('beforeend',
      `<div class="empty" style="padding:14px">… 还有 ${filtered.length - 500} 条，搜索或过滤以缩小范围</div>`);
  }
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffM = (now - d) / 60000;
  if (diffM < 60)    return `${Math.floor(diffM)}m ago`;
  if (diffM < 1440)  return `${Math.floor(diffM / 60)}h ago`;
  return d.toISOString().slice(0, 16).replace('T', ' ');
}
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g,
    c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

document.querySelectorAll('.pill-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.pill-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentFilter = b.dataset.filter;
    render();
  });
});

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
