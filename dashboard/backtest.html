<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HonestTrend 回测复盘 — 每笔交易决策可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #0d1117; color: #c9d1d9; line-height: 1.5; }
        .container { max-width: 1280px; margin: 0 auto; padding: 16px; }

        /* Header */
        h1 { font-size: 24px; margin: 12px 0; color: #58a6ff; }
        .subtitle { color: #8b949e; font-size: 13px; margin-bottom: 16px; }
        .nav { margin-bottom: 12px; }
        .nav a { color: #58a6ff; text-decoration: none; margin-right: 16px; font-size: 14px; }
        .nav a:hover { text-decoration: underline; }

        /* Summary metrics */
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                   gap: 8px; margin-bottom: 20px; }
        .stat { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
                padding: 12px; text-align: center; }
        .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 22px; font-weight: bold; margin-top: 4px; }
        .stat-value.green { color: #3fb950; }
        .stat-value.red { color: #f85149; }
        .stat-value.yellow { color: #d29922; }
        .stat-value.blue { color: #58a6ff; }

        /* Filters */
        .filters { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
                   padding: 12px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 12px;
                   align-items: center; }
        .filters label { font-size: 13px; color: #8b949e; margin-right: 4px; }
        .filters select, .filters input {
            background: #0d1117; color: #c9d1d9; border: 1px solid #30363d;
            border-radius: 6px; padding: 6px 8px; font-size: 13px; }
        .filters .pill { background: #21262d; padding: 4px 10px; border-radius: 16px;
                         font-size: 12px; color: #8b949e; }

        /* Trade card */
        .trade-grid { display: grid; gap: 12px; }
        .trade { background: #161b22; border: 1px solid #30363d; border-radius: 10px;
                 padding: 16px; }
        .trade.win { border-left: 3px solid #3fb950; }
        .trade.loss { border-left: 3px solid #f85149; }

        .trade-header { display: flex; flex-wrap: wrap; align-items: center;
                        gap: 12px; margin-bottom: 12px; }
        .trade-id { background: #21262d; padding: 2px 8px; border-radius: 12px;
                    font-size: 11px; color: #8b949e; font-family: monospace; }
        .trade-pair { font-size: 18px; font-weight: bold; color: #58a6ff; }
        .trade-profit { font-size: 18px; font-weight: bold; margin-left: auto; }
        .trade-profit.green { color: #3fb950; }
        .trade-profit.red { color: #f85149; }
        .trade-meta { font-size: 12px; color: #8b949e; }

        .trade-body { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 768px) {
            .trade-body { grid-template-columns: 1fr; }
        }

        .panel { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 12px; }
        .panel-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
                       color: #8b949e; margin-bottom: 8px; }
        .panel-time { font-size: 11px; color: #6e7681; margin-bottom: 8px; }
        .panel-price { font-size: 16px; font-weight: bold; color: #58a6ff; margin-bottom: 10px; }

        .check { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0;
                 border-bottom: 1px dashed #21262d; }
        .check:last-child { border-bottom: none; }
        .check-mark { font-size: 14px; min-width: 16px; }
        .check-pass { color: #3fb950; }
        .check-fail { color: #f85149; }
        .check-text { flex: 1; font-size: 13px; }
        .check-name { color: #c9d1d9; }
        .check-detail { color: #6e7681; font-size: 11px; margin-top: 2px; font-family: monospace; }

        /* Sparkline */
        .sparkline-wrap { margin-top: 12px; background: #0d1117; border: 1px solid #21262d;
                         border-radius: 8px; padding: 8px; }
        .sparkline { width: 100%; height: 80px; }

        /* Empty / pagination */
        .empty { text-align: center; color: #8b949e; padding: 40px; }
        .pager { display: flex; justify-content: center; align-items: center; gap: 12px;
                 margin: 20px 0; }
        .pager button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
                        border-radius: 6px; padding: 6px 14px; cursor: pointer; }
        .pager button:hover { background: #30363d; }
        .pager button:disabled { opacity: 0.3; cursor: not-allowed; }

        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px;
                 font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-roi { background: #1f4429; color: #3fb950; }
        .badge-trend_exit { background: #1f3a4a; color: #58a6ff; }
        .badge-stop_loss { background: #4a1f1f; color: #f85149; }
        .badge-force_exit { background: #4a3a1f; color: #d29922; }

        .legend { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
                  padding: 12px; margin-bottom: 16px; font-size: 12px; color: #8b949e; }
        .legend strong { color: #c9d1d9; }
        .legend code { background: #21262d; padding: 1px 4px; border-radius: 3px;
                       color: #c9d1d9; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="../index.html">🏠 主页</a>
            <a href="overview.html">🎯 系统总览</a>
            <a href="index.html">DCA Dashboard</a>
            <a href="backtest.html">回测复盘</a>
        </div>

        <h1 id="title">HonestTrend 回测复盘</h1>
        <div class="subtitle" id="meta"></div>

        <div class="summary" id="summary"></div>

        <div class="legend">
            <strong>说明</strong>：每笔交易显示**入场时**和**出场时**的指标快照，逐项标注 ✓/✗。
            ✓ 表示规则触发，绿色 = 入场满足全部 6 条；任一 ✗ 都不应该开仓（如果开了，是数据偏差）。
            <br>每笔的 mini chart 是该交易期间 + 前后 padding 的价格曲线，深色段是持仓期间。
            <br>策略参数: <code id="params"></code>
        </div>

        <div class="filters">
            <span class="pill">筛选</span>
            <label>币对</label>
            <select id="filter-pair"><option value="">全部</option></select>
            <label>结果</label>
            <select id="filter-result">
                <option value="">全部</option>
                <option value="win">仅盈利</option>
                <option value="loss">仅亏损</option>
            </select>
            <label>退出</label>
            <select id="filter-exit"><option value="">全部</option></select>
            <label>排序</label>
            <select id="sort">
                <option value="date">按时间正序</option>
                <option value="-date">按时间倒序</option>
                <option value="-profit">按盈利降序</option>
                <option value="profit">按盈利升序</option>
                <option value="-duration">持仓最长</option>
            </select>
            <span class="pill" id="filter-count">0 / 0</span>
        </div>

        <div class="pager">
            <button id="prev-btn">‹ 上一页</button>
            <span id="page-info">页 1 / 1</span>
            <button id="next-btn">下一页 ›</button>
            <select id="page-size">
                <option value="10">10/页</option>
                <option value="20" selected>20/页</option>
                <option value="50">50/页</option>
                <option value="9999">全部</option>
            </select>
        </div>

        <div class="trade-grid" id="trades"></div>

        <div class="pager">
            <button id="prev-btn-2">‹ 上一页</button>
            <span id="page-info-2">页 1 / 1</span>
            <button id="next-btn-2">下一页 ›</button>
        </div>
    </div>

    <script src="backtest_data.js"></script>
    <script>
        const D = window.BACKTEST_DATA || { trades: [], summary: {}, params: {}, pairs: [] };
        let state = { page: 1, pageSize: 20, pair: '', result: '', exit: '', sort: 'date' };

        // ----- render helpers -----
        function fmtPct(r) {
            const n = (r * 100);
            const sign = n >= 0 ? '+' : '';
            return sign + n.toFixed(2) + '%';
        }
        function fmtUSDT(n) { return (n >= 0 ? '+' : '') + n.toFixed(2); }
        function fmtDuration(min) {
            const d = Math.floor(min / 1440);
            const h = Math.floor((min % 1440) / 60);
            return d > 0 ? `${d}d ${h}h` : `${h}h`;
        }
        function fmtTime(iso) {
            return iso.replace('T', ' ').slice(0, 16);
        }

        // ----- header / summary -----
        document.getElementById('title').textContent =
            `${D.strategy || 'Strategy'} 回测复盘`;
        const meta = `${D.timeframe || ''} | ${D.summary.timerange || ''} | 生成于 ${(D.generated_at || '').slice(0, 19).replace('T', ' ')} UTC`;
        document.getElementById('meta').textContent = meta;
        document.getElementById('params').textContent = JSON.stringify(D.params);

        const sm = D.summary;
        const pf = sm.profit_factor;
        const pfClass = pf >= 1.3 ? 'green' : pf >= 1.0 ? 'yellow' : 'red';
        const totalClass = sm.profit_total_pct >= 0 ? 'green' : 'red';
        document.getElementById('summary').innerHTML = `
            <div class="stat"><div class="stat-label">交易数</div><div class="stat-value blue">${sm.trades_count}</div></div>
            <div class="stat"><div class="stat-label">总盈亏</div><div class="stat-value ${totalClass}">${fmtPct((sm.profit_total_pct || 0) / 100)}</div></div>
            <div class="stat"><div class="stat-label">USDT</div><div class="stat-value ${totalClass}">${fmtUSDT(sm.profit_total_abs || 0)}</div></div>
            <div class="stat"><div class="stat-label">胜率</div><div class="stat-value ${(sm.winrate || 0) >= 45 ? 'green' : 'yellow'}">${(sm.winrate || 0).toFixed(1)}%</div></div>
            <div class="stat"><div class="stat-label">Profit Factor</div><div class="stat-value ${pfClass}">${(pf || 0).toFixed(2)}</div></div>
            <div class="stat"><div class="stat-label">最大回撤</div><div class="stat-value ${(sm.max_drawdown_account || 0) > 0.15 ? 'red' : 'yellow'}">${((sm.max_drawdown_account || 0) * 100).toFixed(2)}%</div></div>
        `;

        // ----- filter dropdowns -----
        const pairSel = document.getElementById('filter-pair');
        D.pairs.forEach(p => {
            const o = document.createElement('option'); o.value = p; o.textContent = p;
            pairSel.appendChild(o);
        });
        const exitSel = document.getElementById('filter-exit');
        const exitSet = new Set(D.trades.map(t => t.exit_reason).filter(Boolean));
        Array.from(exitSet).sort().forEach(e => {
            const o = document.createElement('option'); o.value = e; o.textContent = e;
            exitSel.appendChild(o);
        });

        // ----- filter / sort logic -----
        function filtered() {
            let xs = D.trades.slice();
            if (state.pair) xs = xs.filter(t => t.pair === state.pair);
            if (state.result === 'win') xs = xs.filter(t => t.profit_ratio > 0);
            if (state.result === 'loss') xs = xs.filter(t => t.profit_ratio < 0);
            if (state.exit) xs = xs.filter(t => t.exit_reason === state.exit);
            const cmp = {
                'date':      (a, b) => a.open_date.localeCompare(b.open_date),
                '-date':     (a, b) => b.open_date.localeCompare(a.open_date),
                'profit':    (a, b) => a.profit_ratio - b.profit_ratio,
                '-profit':   (a, b) => b.profit_ratio - a.profit_ratio,
                '-duration': (a, b) => b.duration_min - a.duration_min,
            }[state.sort];
            xs.sort(cmp);
            return xs;
        }

        // ----- sparkline (inline SVG, no deps) -----
        function sparkline(points) {
            if (!points || points.length === 0) return '';
            const W = 600, H = 70, P = 4;
            const cs = points.map(p => p.c);
            const min = Math.min(...cs), max = Math.max(...cs);
            const range = max - min || 1;
            const pts = points.map((p, i) => {
                const x = P + i * (W - 2 * P) / (points.length - 1);
                const y = P + (H - 2 * P) * (1 - (p.c - min) / range);
                return [x, y, p.in_trade];
            });
            const path = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
            // Highlight in-trade segment
            const inTradeStart = pts.findIndex(p => p[2]);
            const inTradeEnd   = pts.length - 1 - [...pts].reverse().findIndex(p => p[2]);
            let hl = '';
            if (inTradeStart >= 0 && inTradeEnd >= inTradeStart) {
                const sub = pts.slice(inTradeStart, inTradeEnd + 1);
                const subPath = sub.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
                hl = `<path d="${subPath}" fill="none" stroke="#58a6ff" stroke-width="2.5"/>`;
            }
            return `<svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
                <path d="${path}" fill="none" stroke="#30363d" stroke-width="1.5"/>
                ${hl}
            </svg>`;
        }

        function checkRow(c) {
            const mark = c.pass ? '✓' : '✗';
            const cls = c.pass ? 'check-pass' : 'check-fail';
            return `<div class="check">
                <div class="check-mark ${cls}">${mark}</div>
                <div class="check-text">
                    <div class="check-name">${c.name}</div>
                    <div class="check-detail">${c.detail}</div>
                </div>
            </div>`;
        }

        function tradeCard(t) {
            const winCls = t.profit_ratio > 0 ? 'win' : 'loss';
            const profitCls = t.profit_ratio > 0 ? 'green' : 'red';
            const exitBadge = t.exit_reason
                ? `<span class="badge badge-${t.exit_reason}">${t.exit_reason}</span>`
                : '';
            const entryChecks = (t.entry?.checks || []).map(checkRow).join('');
            const exitChecks  = (t.exit?.checks  || []).map(checkRow).join('');
            return `<div class="trade ${winCls}">
                <div class="trade-header">
                    <span class="trade-id">#${t.id}</span>
                    <span class="trade-pair">${t.pair}</span>
                    ${exitBadge}
                    <span class="trade-meta">
                        ${fmtTime(t.open_date)} → ${fmtTime(t.close_date)} (${fmtDuration(t.duration_min)})
                    </span>
                    <span class="trade-profit ${profitCls}">
                        ${fmtPct(t.profit_ratio)} (${fmtUSDT(t.profit_abs)} USDT)
                    </span>
                </div>
                <div class="trade-body">
                    <div class="panel">
                        <div class="panel-title">入场判断 (Entry)</div>
                        <div class="panel-time">at ${t.entry?.candle_time?.slice(0, 19).replace('T',' ') || t.open_date}</div>
                        <div class="panel-price">${(t.entry?.price ?? t.open_rate).toFixed(2)} USDT</div>
                        ${entryChecks || '<div class="check-detail">(无指标快照)</div>'}
                    </div>
                    <div class="panel">
                        <div class="panel-title">出场判断 (Exit)</div>
                        <div class="panel-time">at ${t.exit?.candle_time?.slice(0, 19).replace('T',' ') || t.close_date}</div>
                        <div class="panel-price">${(t.exit?.price ?? t.close_rate).toFixed(2)} USDT</div>
                        ${exitChecks || '<div class="check-detail">(无指标快照)</div>'}
                    </div>
                </div>
                <div class="sparkline-wrap">
                    <div class="panel-title">价格走势 (持仓段加亮)</div>
                    ${sparkline(t.price_window)}
                </div>
            </div>`;
        }

        // ----- pagination + render -----
        function render() {
            const xs = filtered();
            const total = xs.length;
            const pageSize = state.pageSize;
            const totalPages = Math.max(1, Math.ceil(total / pageSize));
            if (state.page > totalPages) state.page = totalPages;
            if (state.page < 1) state.page = 1;

            const start = (state.page - 1) * pageSize;
            const slice = xs.slice(start, start + pageSize);

            document.getElementById('filter-count').textContent = `${total} / ${D.trades.length} 笔`;
            document.getElementById('page-info').textContent = `页 ${state.page} / ${totalPages}`;
            document.getElementById('page-info-2').textContent = `页 ${state.page} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = state.page <= 1;
            document.getElementById('prev-btn-2').disabled = state.page <= 1;
            document.getElementById('next-btn').disabled = state.page >= totalPages;
            document.getElementById('next-btn-2').disabled = state.page >= totalPages;

            const tradesEl = document.getElementById('trades');
            if (slice.length === 0) {
                tradesEl.innerHTML = '<div class="empty">没有符合筛选条件的交易</div>';
            } else {
                tradesEl.innerHTML = slice.map(tradeCard).join('');
            }
        }

        // ----- wire up controls -----
        document.getElementById('filter-pair').addEventListener('change', e => { state.pair = e.target.value; state.page = 1; render(); });
        document.getElementById('filter-result').addEventListener('change', e => { state.result = e.target.value; state.page = 1; render(); });
        document.getElementById('filter-exit').addEventListener('change', e => { state.exit = e.target.value; state.page = 1; render(); });
        document.getElementById('sort').addEventListener('change', e => { state.sort = e.target.value; render(); });
        document.getElementById('page-size').addEventListener('change', e => { state.pageSize = +e.target.value; state.page = 1; render(); });
        ['prev-btn', 'prev-btn-2'].forEach(id => document.getElementById(id).addEventListener('click', () => { state.page--; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }));
        ['next-btn', 'next-btn-2'].forEach(id => document.getElementById(id).addEventListener('click', () => { state.page++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }));

        render();
    </script>
</body>
</html>
