<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📦 回测档案库</title>
<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.35.2/plotly.min.js"></script>
<style>
  body { background:#0d1117; color:#c9d1d9; margin:0; padding:0;
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; line-height:1.5; }
  .topbar { background:#161b22; border-bottom:1px solid #30363d;
            padding:10px 24px; font-size:13px;
            display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:0; z-index:10; }
  .topbar a { color:#58a6ff; text-decoration:none; margin-right:16px; }
  .container { max-width:1300px; margin:0 auto; padding:24px 20px 80px; }
  h1 { color:#58a6ff; font-size:24px; margin:0 0 6px; }
  .subtitle { color:#8b949e; font-size:13px; margin-bottom:16px; }

  .filter-bar { display:flex; gap:10px; flex-wrap:wrap; align-items:center;
                margin-bottom:14px; padding:10px 14px;
                background:#161b22; border:1px solid #30363d; border-radius:6px; }
  .filter-bar label { color:#8b949e; font-size:12px; }
  .filter-bar select { background:#0d1117; border:1px solid #30363d; color:#c9d1d9;
                       padding:5px 10px; border-radius:3px; font-size:13px; }

  table { width:100%; border-collapse:collapse; font-size:12px;
          background:#161b22; border:1px solid #30363d; border-radius:6px;
          overflow:hidden; }
  th { background:#21262d; color:#f0f6fc; padding:8px 10px;
       text-align:left; font-weight:600; font-size:11px; letter-spacing:0.3px;
       white-space:nowrap; }
  td { padding:8px 10px; border-top:1px solid #21262d;
       font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11.5px; }
  tr:hover { background:#1c2128; cursor:pointer; }
  td.num { text-align:right; }
  td.pos { color:#3fb950; }
  td.neg { color:#f85149; }
  td.meta { color:#6e7681; }

  .compare-bar { background:#161b22; border:1px solid #30363d; border-radius:6px;
                 padding:10px 14px; margin-bottom:12px; display:none;
                 font-size:13px; color:#c9d1d9;
                 display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .compare-bar.active { display:flex; }
  .btn { background:#21262d; color:#c9d1d9; border:1px solid #30363d;
         padding:5px 12px; border-radius:3px; cursor:pointer; font-size:12px; }
  .btn:hover { background:#30363d; border-color:#58a6ff; }
  .btn.primary { background:#238636; border-color:#238636; color:#fff; }
  .btn.primary:hover { background:#2ea043; }

  .detail { background:#161b22; border:1px solid #30363d; border-radius:6px;
            padding:16px 20px; margin-top:14px; display:none; }
  .detail.open { display:block; }
  .detail h3 { color:#f0f6fc; font-size:15px; margin:0 0 10px; }

  .chip { display:inline-block; padding:2px 8px; background:#21262d; color:#c9d1d9;
          border-radius:10px; font-size:11px; margin-right:4px; }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <a href="/">🏠 主页</a>
    <a href="/dashboard/overview.html">🎯 总览</a>
    <a href="/dashboard/backtest_launcher.html">🚀 Launcher</a>
    <a href="/dashboard/chart.html">📉 Chart</a>
  </div>
  <span style="color:#6e7681" id="count-badge">...</span>
</div>
<div class="container">
  <h1>📦 回测档案库</h1>
  <div class="subtitle">
    所有历史 backtest 持久化到 TimescaleDB · 点击行展开细节 ·
    勾选 2 行后可侧边对比
  </div>

  <div class="filter-bar">
    <label>Strategy</label>
    <select id="strategy-filter"><option value="">All</option></select>
    <label>Sort</label>
    <select id="sort">
      <option value="started_desc">Started (latest first)</option>
      <option value="profit_desc">Total profit ↓</option>
      <option value="dd_asc">Max DD ↑</option>
      <option value="calmar_desc">Calmar ↓</option>
      <option value="trades_desc">Trade count ↓</option>
    </select>
    <span style="margin-left:auto;color:#6e7681;font-size:11px" id="refresh-status"></span>
  </div>

  <div class="compare-bar" id="compare-bar">
    <span>已选: <b id="compare-count">0</b> / 2</span>
    <button class="btn" onclick="clearCompare()">清空</button>
    <button class="btn primary" onclick="doCompare()" id="compare-btn" disabled>对比 →</button>
  </div>

  <table>
    <thead>
      <tr>
        <th style="width:20px"></th>
        <th>Started</th>
        <th>Strategy</th>
        <th>TF</th>
        <th class="num">Trades</th>
        <th class="num">WinRate</th>
        <th class="num">Profit%</th>
        <th class="num">ProfitABS</th>
        <th class="num">Max DD%</th>
        <th class="num">Calmar</th>
        <th class="num">Sharpe</th>
        <th class="num">Profit Factor</th>
        <th>Pairs</th>
      </tr>
    </thead>
    <tbody id="runs-tbody"></tbody>
  </table>

  <div class="detail" id="detail"></div>
  <div class="detail" id="compare-pane"></div>
</div>

<script>
let allRuns = [];
let selected = new Set();
let currentSort = 'started_desc';

async function load() {
  const r = await fetch('/api/backtest-runs?limit=500');
  const d = await r.json();
  allRuns = d.runs || [];
  document.getElementById('count-badge').textContent = `${allRuns.length} runs`;
  fillStrategyFilter();
  render();
  document.getElementById('refresh-status').textContent =
    `更新: ${new Date().toLocaleTimeString()}`;
}

function fillStrategyFilter() {
  const sel = document.getElementById('strategy-filter');
  const strategies = [...new Set(allRuns.map(r => r.strategy))].sort();
  sel.innerHTML = '<option value="">All</option>' +
    strategies.map(s => `<option>${s}</option>`).join('');
}

function render() {
  const strat = document.getElementById('strategy-filter').value;
  const sort = document.getElementById('sort').value;
  let rows = allRuns.slice();
  if (strat) rows = rows.filter(r => r.strategy === strat);
  rows.sort(sortFn(sort));

  const tbody = document.getElementById('runs-tbody');
  tbody.innerHTML = rows.map(r => {
    const profitCls = r.total_profit_pct > 0 ? 'pos' : (r.total_profit_pct < 0 ? 'neg' : '');
    const ddCls = (r.max_drawdown_pct || 0) > 20 ? 'neg' : '';
    const pairs = (r.pairs || []).slice(0, 3).map(p => `<span class="chip">${p}</span>`).join('') +
                  (r.pairs && r.pairs.length > 3 ? `<span class="chip">+${r.pairs.length - 3}</span>` : '');
    const checked = selected.has(r.id) ? 'checked' : '';
    return `<tr data-id="${r.id}">
      <td><input type="checkbox" ${checked} onchange="toggleSelect(${r.id}, this)" onclick="event.stopPropagation()"></td>
      <td class="meta">${fmtTime(r.started_at)}</td>
      <td><b>${r.strategy}</b></td>
      <td>${r.timeframe || '-'}</td>
      <td class="num">${r.total_trades || 0}</td>
      <td class="num">${(r.win_rate_pct ?? 0).toFixed(1)}%</td>
      <td class="num ${profitCls}">${(r.total_profit_pct ?? 0).toFixed(2)}%</td>
      <td class="num ${profitCls}">$${(r.total_profit_abs ?? 0).toFixed(0)}</td>
      <td class="num ${ddCls}">${(r.max_drawdown_pct ?? 0).toFixed(2)}%</td>
      <td class="num">${r.calmar != null ? r.calmar.toFixed(2) : '-'}</td>
      <td class="num">${r.sharpe != null ? r.sharpe.toFixed(2) : '-'}</td>
      <td class="num">${r.profit_factor != null ? r.profit_factor.toFixed(2) : '-'}</td>
      <td>${pairs}</td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => showDetail(parseInt(tr.dataset.id)));
  });
}

function sortFn(mode) {
  const m = {
    started_desc: (a, b) => (b.started_at || '').localeCompare(a.started_at || ''),
    profit_desc:  (a, b) => (b.total_profit_pct || 0) - (a.total_profit_pct || 0),
    dd_asc:       (a, b) => (a.max_drawdown_pct || 99) - (b.max_drawdown_pct || 99),
    calmar_desc:  (a, b) => (b.calmar || -99) - (a.calmar || -99),
    trades_desc:  (a, b) => (b.total_trades || 0) - (a.total_trades || 0),
  };
  return m[mode];
}

function fmtTime(iso) {
  if (!iso) return '-';
  return new Date(iso).toISOString().replace('T', ' ').slice(0, 16);
}

function toggleSelect(id, checkbox) {
  if (checkbox.checked) {
    if (selected.size >= 2) {
      checkbox.checked = false;
      return;
    }
    selected.add(id);
  } else {
    selected.delete(id);
  }
  const bar = document.getElementById('compare-bar');
  bar.classList.toggle('active', selected.size > 0);
  document.getElementById('compare-count').textContent = selected.size;
  document.getElementById('compare-btn').disabled = selected.size !== 2;
}
function clearCompare() {
  selected.clear();
  render();
  document.getElementById('compare-bar').classList.remove('active');
  document.getElementById('compare-pane').classList.remove('open');
}

async function showDetail(id) {
  document.getElementById('compare-pane').classList.remove('open');
  const el = document.getElementById('detail');
  el.classList.add('open');
  el.innerHTML = '<div style="color:#8b949e">加载中…</div>';
  const run = allRuns.find(r => r.id === id);
  const r = await fetch(`/api/backtest-run-trades?id=${id}`);
  const d = await r.json();
  const trades = d.trades || [];

  // Build equity curve
  let eq = 0;
  const eqPoints = trades.map(t => {
    eq += t.profit_abs || 0;
    return { x: t.close_date || t.open_date, y: eq };
  });

  el.innerHTML = `
    <h3>${run.strategy} · ${run.timeframe} · run #${id}</h3>
    <div style="color:#8b949e;font-size:12px;margin-bottom:10px">
      Started ${fmtTime(run.started_at)} · ${run.total_trades} trades ·
      Profit ${(run.total_profit_pct || 0).toFixed(2)}% (${run.total_profit_abs || 0}) ·
      Max DD ${(run.max_drawdown_pct || 0).toFixed(2)}% · Calmar ${(run.calmar || 0).toFixed(1)}
    </div>
    <div id="eq-chart" style="height:300px"></div>
    <h4 style="color:#f0f6fc;margin:16px 0 6px;font-size:13px">前 30 笔</h4>
    <table style="font-size:11px">
      <thead><tr>
        <th>#</th><th>Pair</th><th>方向</th><th>Open</th><th>Close</th>
        <th class="num">Open Rate</th><th class="num">Close Rate</th>
        <th class="num">P&L</th><th class="num">%</th><th>Exit</th>
      </tr></thead>
      <tbody>${trades.slice(0, 30).map(t => {
        const cls = t.profit_abs > 0 ? 'pos' : 'neg';
        return `<tr>
          <td>${t.trade_id}</td><td>${t.pair}</td>
          <td>${t.is_short ? '🔴 S' : '🟢 L'}</td>
          <td class="meta">${fmtTime(t.open_date)}</td>
          <td class="meta">${fmtTime(t.close_date)}</td>
          <td class="num">${(t.open_rate || 0).toFixed(2)}</td>
          <td class="num">${(t.close_rate || 0).toFixed(2)}</td>
          <td class="num ${cls}">$${(t.profit_abs || 0).toFixed(2)}</td>
          <td class="num ${cls}">${(t.profit_pct || 0).toFixed(2)}%</td>
          <td>${t.exit_reason || ''}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  `;
  if (eqPoints.length) {
    Plotly.newPlot('eq-chart', [{
      x: eqPoints.map(p => p.x), y: eqPoints.map(p => p.y),
      mode: 'lines', fill: 'tozeroy',
      line: { color: '#58a6ff', width: 2 },
    }], {
      template: 'plotly_dark',
      plot_bgcolor: '#0d1117', paper_bgcolor: '#161b22',
      font: { color: '#c9d1d9' },
      margin: { t: 10, b: 40, l: 60, r: 10 },
      xaxis: { type: 'date', gridcolor: '#21262d' },
      yaxis: { title: 'Cumulative P&L (USDT)', gridcolor: '#21262d' },
    }, { responsive: true });
  }
}

async function doCompare() {
  const ids = [...selected];
  document.getElementById('detail').classList.remove('open');
  const el = document.getElementById('compare-pane');
  el.classList.add('open');
  el.innerHTML = '<div style="color:#8b949e">加载中…</div>';

  const runs = ids.map(id => allRuns.find(r => r.id === id));
  const responses = await Promise.all(ids.map(id =>
    fetch(`/api/backtest-run-trades?id=${id}`).then(r => r.json())));

  // Render comparison cards + overlayed equity
  const cards = runs.map((r, i) => `
    <div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px 14px">
      <div style="color:#58a6ff;font-weight:600">${r.strategy} · run #${r.id}</div>
      <div style="color:#8b949e;font-size:11px">${r.timeframe} · ${fmtTime(r.started_at)}</div>
      <div style="margin-top:6px;display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px;font-family:ui-monospace,monospace">
        <div>Trades: <b>${r.total_trades}</b></div>
        <div>WR: <b>${(r.win_rate_pct||0).toFixed(1)}%</b></div>
        <div>Profit: <b class="${(r.total_profit_pct||0) > 0 ? 'pos':'neg'}" style="color:${(r.total_profit_pct||0) > 0 ? '#3fb950':'#f85149'}">${(r.total_profit_pct||0).toFixed(2)}%</b></div>
        <div>Max DD: <b>${(r.max_drawdown_pct||0).toFixed(2)}%</b></div>
        <div>Calmar: <b>${(r.calmar||0).toFixed(2)}</b></div>
        <div>Sharpe: <b>${(r.sharpe||0).toFixed(2)}</b></div>
      </div>
    </div>
  `).join('');

  const colors = ['#58a6ff', '#f0883e'];
  const traces = responses.map((d, i) => {
    let eq = 0;
    const pts = (d.trades || []).map(t => {
      eq += t.profit_abs || 0;
      return { x: t.close_date || t.open_date, y: eq };
    });
    return {
      x: pts.map(p => p.x), y: pts.map(p => p.y),
      mode: 'lines', name: `run #${ids[i]}`,
      line: { color: colors[i], width: 2 },
    };
  });

  el.innerHTML = `
    <h3>对比 run #${ids[0]} vs #${ids[1]}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">${cards}</div>
    <div id="cmp-chart" style="height:400px"></div>
  `;
  Plotly.newPlot('cmp-chart', traces, {
    template: 'plotly_dark',
    plot_bgcolor: '#0d1117', paper_bgcolor: '#161b22',
    font: { color: '#c9d1d9' },
    margin: { t: 30, b: 40, l: 60, r: 20 },
    xaxis: { type: 'date', gridcolor: '#21262d' },
    yaxis: { title: '累计 P&L (USDT)', gridcolor: '#21262d' },
    legend: { orientation: 'h', y: 1.1 },
  }, { responsive: true });
}

document.getElementById('strategy-filter').addEventListener('change', render);
document.getElementById('sort').addEventListener('change', render);

load();
setInterval(load, 30000);
</script>
</body>
</html>
