<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🚀 回测 Launcher</title>
<style>
  body { background:#0d1117; color:#c9d1d9; margin:0; padding:0;
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; line-height:1.55; }
  .topbar { background:#161b22; border-bottom:1px solid #30363d;
            padding:10px 24px; font-size:13px;
            display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:0; z-index:10; }
  .topbar a { color:#58a6ff; text-decoration:none; margin-right:16px; }
  .container { max-width:1100px; margin:0 auto; padding:24px 20px 80px; }
  h1 { color:#58a6ff; font-size:26px; margin:0 0 6px; }
  h2 { color:#f0f6fc; font-size:18px; margin:24px 0 12px;
       border-bottom:1px solid #21262d; padding-bottom:6px; }
  .subtitle { color:#8b949e; font-size:13px; margin-bottom:14px; }
  .warn { background:#2d1b00; border:1px solid #9e6a03; color:#c9d1d9;
          padding:12px 16px; border-radius:6px; margin:14px 0; font-size:13px; }
  .warn b { color:#f0883e; }

  .form { background:#161b22; border:1px solid #30363d; border-radius:8px;
          padding:18px 22px; margin:16px 0; }
  .row { display:grid; grid-template-columns:140px 1fr; gap:10px; margin:10px 0;
         align-items:center; }
  .row label { color:#8b949e; font-size:12px; }
  select, input[type=text] { background:#0d1117; border:1px solid #30363d; color:#c9d1d9;
                             padding:8px 10px; border-radius:4px; font-size:13px;
                             font-family:ui-monospace,monospace; }
  select:focus, input:focus { outline:none; border-color:#58a6ff; }
  .preset-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
  .preset { background:#21262d; color:#c9d1d9; border:1px solid #30363d;
            padding:3px 8px; border-radius:3px; cursor:pointer; font-size:11px;
            font-family:ui-monospace,monospace; }
  .preset:hover { background:#30363d; }
  .btn { background:#238636; color:#fff; border:none; padding:10px 18px;
         border-radius:4px; font-size:14px; cursor:pointer; font-family:inherit; }
  .btn:hover { background:#2ea043; }
  .btn:disabled { background:#30363d; cursor:not-allowed; opacity:0.6; }
  .cmd-preview { background:#0d1117; border:1px solid #30363d; border-radius:4px;
                 padding:10px 12px; color:#79c0ff; font-size:11px;
                 font-family:ui-monospace,monospace; overflow-x:auto; margin:10px 0;
                 white-space:pre-wrap; word-break:break-all; }

  .job-card { background:#161b22; border:1px solid #30363d; border-radius:8px;
              padding:12px 16px; margin:8px 0; }
  .job-card.running { border-left:4px solid #d29922; }
  .job-card.ok { border-left:4px solid #3fb950; }
  .job-card.failed, .job-card.error { border-left:4px solid #f85149; }
  .job-head { display:flex; justify-content:space-between; align-items:center;
              cursor:pointer; }
  .job-title { color:#f0f6fc; font-size:13px; font-weight:500; }
  .job-meta { color:#6e7681; font-size:11px; font-family:ui-monospace,monospace; }
  .job-status { padding:2px 8px; border-radius:10px; font-size:11px;
                font-family:ui-monospace,monospace; }
  .job-status.running { background:#3a2d00; color:#f0883e; }
  .job-status.ok      { background:#0d4429; color:#3fb950; }
  .job-status.failed, .job-status.error { background:#3a0d0d; color:#f85149; }
  .job-body { display:none; margin-top:10px; border-top:1px solid #21262d; padding-top:10px; }
  .job-card.expanded .job-body { display:block; }
  pre.log { background:#0d1117; border:1px solid #30363d; border-radius:4px;
            padding:10px; color:#c9d1d9; font-size:11px; font-family:ui-monospace,monospace;
            max-height:400px; overflow:auto; white-space:pre; margin:0; }

  .empty { background:#161b22; border:1px dashed #30363d; border-radius:6px;
           padding:20px; text-align:center; color:#8b949e; font-size:13px; }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <a href="/">🏠 主页</a>
    <a href="/dashboard/overview.html">🎯 系统总览</a>
    <a href="/dashboard/params.html">⚙️ 参数编辑</a>
  </div>
  <span style="color:#6e7681">dashboard/backtest_launcher.html</span>
</div>
<div class="container">
  <h1>🚀 回测 Launcher</h1>
  <div class="subtitle">
    后台 spawn <code>freqtrade backtesting</code> 子进程 · 日志实时追加 · 同时最多 2 个作业
  </div>

  <div class="warn">
    <b>⚠ 注意：</b>一次长历史回测（8 年 1m）可能跑 15-40 分钟，占 CPU + 数 GB 内存。
    建议先用短时间段试一下（<b>--timerange 20240101-20250101</b>）。
    页面关闭也不影响任务继续跑（作业在服务器端）。
  </div>

  <h2>🎛️ 新建作业</h2>
  <div class="form">
    <div class="row">
      <label>Strategy</label>
      <select id="strategy"></select>
    </div>
    <div class="row">
      <label>Config</label>
      <select id="config"></select>
    </div>
    <div class="row">
      <label>Timerange</label>
      <div>
        <input id="timerange" type="text" placeholder="20240101-20260101（留空 = 全历史）" style="width:320px">
        <div class="preset-row">
          <button class="preset" onclick="setTR('20240101-20250101')">2024 单年</button>
          <button class="preset" onclick="setTR('20220101-20221231')">2022 LUNA</button>
          <button class="preset" onclick="setTR('20200801-20260421')">A5 对比窗口</button>
          <button class="preset" onclick="setTR('20200914-20260421')">Phase B 窗口</button>
          <button class="preset" onclick="setTR('')">全历史</button>
        </div>
      </div>
    </div>
    <div class="cmd-preview" id="cmd-preview">(选好后显示命令)</div>
    <button class="btn" id="start-btn" onclick="startJob()">▶ 启动回测</button>
    <span id="start-status" style="margin-left:12px;color:#8b949e;font-size:12px"></span>
  </div>

  <h2>📋 作业队列 <span style="color:#6e7681;font-size:12px;font-weight:400">自动刷新 5s</span></h2>
  <div id="jobs"></div>
</div>

<script>
async function loadOptions() {
  const r = await fetch('/api/backtest-options');
  const d = await r.json();
  const strat = document.getElementById('strategy');
  const cfg = document.getElementById('config');
  d.strategies.forEach(s => strat.insertAdjacentHTML('beforeend', `<option>${s}</option>`));
  d.configs.forEach(c => cfg.insertAdjacentHTML('beforeend', `<option>${c}</option>`));
  // Reasonable defaults
  strat.value = 'HonestTrend15mDry';
  cfg.value = 'config_backtest_15m_alts_a5.json';
  updatePreview();
}

function setTR(v) {
  document.getElementById('timerange').value = v;
  updatePreview();
}
function updatePreview() {
  const s  = document.getElementById('strategy').value;
  const c  = document.getElementById('config').value;
  const tr = document.getElementById('timerange').value.trim();
  const trArg = tr ? `--timerange ${tr} ` : '';
  document.getElementById('cmd-preview').textContent =
    `python -m freqtrade backtesting \\\n` +
    `  --strategy ${s} \\\n` +
    `  --config configs/backtest/${c} \\\n` +
    `  --datadir user_data/data/binance \\\n` +
    `  --user-data-dir user_data \\\n` +
    `  --strategy-path strategies \\\n` +
    `  --cache none \\\n` +
    (tr ? `  --timerange ${tr}` : '');
}
['strategy', 'config', 'timerange'].forEach(id =>
  document.getElementById(id).addEventListener('input', updatePreview));

async function startJob() {
  const btn = document.getElementById('start-btn');
  const st  = document.getElementById('start-status');
  btn.disabled = true; st.textContent = '提交中…'; st.style.color = '#8b949e';
  try {
    const r = await fetch('/api/backtest-start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        strategy:  document.getElementById('strategy').value,
        config:    document.getElementById('config').value,
        timerange: document.getElementById('timerange').value.trim(),
      }),
    });
    const d = await r.json();
    if (d.ok) {
      st.textContent = `✓ 作业已启动 (${d.job_id})`;
      st.style.color = '#3fb950';
      loadJobs();
    } else {
      st.textContent = `✗ ${d.error || r.status}`;
      st.style.color = '#f85149';
    }
  } catch (e) {
    st.textContent = `✗ ${e.message}`;
    st.style.color = '#f85149';
  } finally {
    btn.disabled = false;
    setTimeout(() => st.textContent = '', 5000);
  }
}

async function loadJobs() {
  const r = await fetch('/api/backtest-jobs');
  const d = await r.json();
  const el = document.getElementById('jobs');
  if (!d.jobs || d.jobs.length === 0) {
    el.innerHTML = '<div class="empty">没有作业（用上面表单启动一个）</div>';
    return;
  }
  el.innerHTML = d.jobs.map(j => {
    const dur = j.finished_at ? diffSec(j.started_at, j.finished_at) : diffSec(j.started_at, new Date().toISOString());
    return `<div class="job-card ${j.status}" id="job-${j.job_id}">
      <div class="job-head" onclick="toggleJob('${j.job_id}')">
        <div>
          <div class="job-title">${j.strategy} · ${j.config}</div>
          <div class="job-meta">id=${j.job_id} · ${j.timerange || '全历史'} · ${formatDate(j.started_at)} · ${Math.floor(dur)}s${j.pid ? ' · pid ' + j.pid : ''}</div>
        </div>
        <span class="job-status ${j.status}">${j.status}</span>
      </div>
      <div class="job-body">
        <pre class="log" id="log-${j.job_id}">加载日志…</pre>
      </div>
    </div>`;
  }).join('');
}

async function toggleJob(jobId) {
  const card = document.getElementById('job-' + jobId);
  card.classList.toggle('expanded');
  if (card.classList.contains('expanded')) {
    refreshLog(jobId);
  }
}
async function refreshLog(jobId) {
  try {
    const r = await fetch(`/api/backtest-job?id=${jobId}`);
    const d = await r.json();
    const logEl = document.getElementById('log-' + jobId);
    if (logEl) {
      logEl.textContent = d.log || '(无日志)';
      logEl.scrollTop = logEl.scrollHeight;
    }
  } catch {}
}
function diffSec(a, b) {
  return (new Date(b) - new Date(a)) / 1000;
}
function formatDate(iso) {
  return new Date(iso).toISOString().replace('T', ' ').slice(0, 19);
}

loadOptions();
loadJobs();
setInterval(() => {
  loadJobs();
  document.querySelectorAll('.job-card.expanded').forEach(card => {
    const id = card.id.replace('job-', '');
    refreshLog(id);
  });
}, 5000);
</script>
</body>
</html>
