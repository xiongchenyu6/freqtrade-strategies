<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎯 交易系统总览</title>
<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.35.2/plotly.min.js"></script>
<style>
  body { background:#0d1117; color:#c9d1d9; margin:0; padding:0;
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; line-height:1.55; }
  .topbar { background:#161b22; border-bottom:1px solid #30363d;
            padding:10px 24px; font-size:13px;
            display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:0; z-index:10; }
  .topbar a { color:#58a6ff; text-decoration:none; margin-right:16px; }
  .topbar .refresh { color:#8b949e; font-size:11px; }
  .container { max-width:1300px; margin:0 auto; padding:20px 20px 80px; }
  h1 { color:#58a6ff; font-size:26px; margin:4px 0; }
  h2 { color:#f0f6fc; font-size:18px; margin:28px 0 10px;
       border-bottom:1px solid #21262d; padding-bottom:6px; display:flex;
       justify-content:space-between; align-items:center; }
  h2 .meta { color:#8b949e; font-size:11px; font-weight:400; }

  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
              gap:10px; margin:18px 0 28px; }
  .kpi { background:#161b22; border:1px solid #30363d; border-left:4px solid #58a6ff;
         padding:12px 16px; border-radius:6px; }
  .kpi .label { color:#8b949e; font-size:11px; text-transform:uppercase;
                letter-spacing:0.5px; }
  .kpi .value { color:#f0f6fc; font-size:22px; font-weight:600; margin-top:4px;
                font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .kpi.good { border-left-color:#3fb950; }
  .kpi.good .value { color:#3fb950; }
  .kpi.bad  { border-left-color:#f85149; }
  .kpi.bad  .value { color:#f85149; }
  .kpi.neutral { border-left-color:#d29922; }
  .kpi .sub { color:#6e7681; font-size:11px; margin-top:4px; }

  .bot-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
              gap:12px; margin-top:14px; }
  .bot-card { background:#161b22; border:1px solid #30363d; border-radius:8px;
              padding:14px 18px; }
  .bot-head { display:flex; justify-content:space-between; align-items:center;
              border-bottom:1px solid #21262d; padding-bottom:8px; margin-bottom:10px; }
  .bot-name { color:#f0f6fc; font-size:14px; font-weight:600; }
  .bot-port { color:#6e7681; font-size:11px; font-family:ui-monospace,monospace; }
  .bot-dot { display:inline-block; width:8px; height:8px; border-radius:50%;
             margin-right:6px; vertical-align:middle; background:#6e7681; }
  .bot-dot.alive { background:#3fb950; box-shadow:0 0 8px #3fb95060; }
  .bot-dot.dead  { background:#f85149; }

  .bot-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px 14px; font-size:12px; }
  .bot-stats .k { color:#8b949e; }
  .bot-stats .v { color:#c9d1d9; font-family:ui-monospace,monospace; text-align:right; }
  .bot-stats .v.pos { color:#3fb950; }
  .bot-stats .v.neg { color:#f85149; }

  table { width:100%; border-collapse:collapse; font-size:12px;
          background:#161b22; border:1px solid #30363d; border-radius:6px;
          overflow:hidden; margin-top:12px; }
  th { background:#21262d; color:#f0f6fc; padding:8px 10px;
       text-align:left; font-weight:600; font-size:11px; letter-spacing:0.3px; }
  td { padding:8px 10px; border-top:1px solid #21262d;
       font-family:ui-monospace,monospace; font-size:11px; }
  td.pos { color:#3fb950; }
  td.neg { color:#f85149; }

  .empty { background:#161b22; border:1px dashed #30363d; border-radius:6px;
           padding:18px; text-align:center; color:#8b949e; font-size:13px; margin:10px 0; }

  .progress { background:#0d1117; border-radius:4px; height:6px; overflow:hidden;
              margin-top:4px; }
  .progress-bar { height:100%; transition:width 0.3s; }

  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:840px) { .two-col { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <a href="/">🏠 主页</a>
    <a href="/dashboard/index.html">DCA Dashboard</a>
    <a href="/dashboard/backtest.html">回测复盘</a>
    <a href="/reports/walk_forward/">WF 对比</a>
    <a href="/reports/event_dca/">事件 DCA</a>
  </div>
  <span class="refresh" id="refresh-status">等待首次刷新…</span>
</div>
<div class="container">
  <h1>🎯 交易系统总览</h1>
  <div style="color:#8b949e;font-size:13px;margin-bottom:18px">
    聚合所有 bot 状态 · 市场指标 · DCA 进度 · walk-forward 摘要。每 20s 自动刷新。
  </div>

  <h2>📊 全局 KPI</h2>
  <div class="kpi-grid" id="kpis"></div>

  <h2>🤖 Bot 实时状态 <span class="meta">SQLite + 实时 ping</span></h2>
  <div class="bot-grid" id="bots"></div>

  <h2>📉 市场上下文 <span class="meta">Binance + alternative.me</span></h2>
  <div class="kpi-grid" id="market"></div>

  <div class="two-col">
    <div>
      <h2>💰 DCA 进度 <span class="meta">event_dca_state.json</span></h2>
      <div id="dca-box"></div>
    </div>
    <div>
      <h2>🧭 Walk-Forward 摘要 <span class="meta">最新 JSON</span></h2>
      <div id="wf-box"></div>
    </div>
  </div>

  <h2>🕐 最近交易（各 bot 前 5 条）</h2>
  <div id="trades"></div>

  <h2>📈 累计利润时间曲线</h2>
  <div id="equity-chart" style="height:360px"></div>
</div>

<script>
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toISOString().replace('T', ' ').slice(0, 16);
}
function fmtUSD(n) {
  if (n == null) return '—';
  return '$' + Math.round(n).toLocaleString();
}
function pctCls(v) { return v > 0 ? 'pos' : (v < 0 ? 'neg' : ''); }

async function fetchJSON(url) {
  try {
    const r = await fetch(url + '?' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch { return null; }
}
async function pingBot(port) {
  try {
    const ctl = new AbortController();
    setTimeout(() => ctl.abort(), 1500);
    const r = await fetch(`http://127.0.0.1:${port}/api/v1/ping`,
                          { signal: ctl.signal, cache: 'no-store' });
    return r.ok || r.status === 401;
  } catch { return false; }
}

async function refresh() {
  const [bots, dca, btcResp, fng] = await Promise.all([
    fetchJSON('/api/bots-summary'),
    fetchJSON('/api/event-dca-state'),
    fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT').then(r => r.json()).catch(() => null),
    fetch('https://api.alternative.me/fng/?limit=1').then(r => r.json()).catch(() => null),
  ]);

  // Pings in parallel
  const pingResults = await Promise.all([3001, 8082, 8083, 8084].map(pingBot));
  const ports = [3001, 8082, 8083, 8084];
  const liveMap = Object.fromEntries(ports.map((p, i) => [p, pingResults[i]]));

  renderKPIs(bots, dca, liveMap);
  renderBots(bots, liveMap);
  renderMarket(btcResp, fng);
  renderDCA(dca);
  renderWF();
  renderTrades(bots);
  renderEquity(bots);

  document.getElementById('refresh-status').textContent =
    '最后刷新: ' + new Date().toLocaleTimeString();
}

function renderKPIs(bots, dca, liveMap) {
  const el = document.getElementById('kpis');
  if (!bots) { el.innerHTML = '<div class="empty">API 失败</div>'; return; }
  const g = bots.grand;
  const aliveCount = [8082, 8083, 8084].filter(p => liveMap[p]).length;
  const kpis = [
    { label: '活跃 bots', value: `${aliveCount}/3`,
      cls: aliveCount === 3 ? 'good' : (aliveCount === 0 ? 'bad' : 'neutral'),
      sub: 'spot long · 1m MTF · futures L+S' },
    { label: '累计 P&L', value: fmtUSD(g.total_profit),
      cls: g.total_profit > 0 ? 'good' : (g.total_profit < 0 ? 'bad' : ''),
      sub: `${g.total_closed} 笔已平仓` },
    { label: '当前持仓', value: g.total_open,
      cls: g.total_open > 0 ? 'neutral' : '',
      sub: '跨 3 个 bot' },
    { label: 'DCA 月预算',
      value: dca && !dca.no_state_file ? `$${Math.round(dca.month_spend)}/$2K` : '$0/$2K',
      cls: 'neutral',
      sub: dca && dca.month_count ? `${dca.month_count} 次已触发` : '待首次触发' },
  ];
  el.innerHTML = kpis.map(k => `
    <div class="kpi ${k.cls || ''}">
      <div class="label">${k.label}</div>
      <div class="value">${k.value}</div>
      <div class="sub">${k.sub || ''}</div>
    </div>`).join('');
}

function renderBots(bots, liveMap) {
  const el = document.getElementById('bots');
  if (!bots) { el.innerHTML = '<div class="empty">API 失败</div>'; return; }
  el.innerHTML = bots.bots.map(b => {
    const alive = liveMap[b.port];
    const profitCls = b.total_profit_abs > 0 ? 'pos' : (b.total_profit_abs < 0 ? 'neg' : '');
    return `
      <div class="bot-card">
        <div class="bot-head">
          <div>
            <span class="bot-dot ${alive ? 'alive' : 'dead'}"></span>
            <span class="bot-name">${b.name}</span>
          </div>
          <span class="bot-port">:${b.port}</span>
        </div>
        <div class="bot-stats">
          <div class="k">Strategy</div><div class="v" style="font-size:11px">${b.strategy}</div>
          <div class="k">已平仓</div><div class="v">${b.closed_trades ?? 0}</div>
          <div class="k">持仓中</div><div class="v">${b.open_trades ?? 0}</div>
          <div class="k">胜率</div><div class="v">${b.win_rate != null ? b.win_rate + '%' : '—'}</div>
          <div class="k">累计 P&L</div><div class="v ${profitCls}">$${(b.total_profit_abs || 0).toFixed(2)}</div>
        </div>
      </div>`;
  }).join('');
}

function renderMarket(btc, fng) {
  const el = document.getElementById('market');
  const btcPrice = btc ? parseFloat(btc.lastPrice) : null;
  const btcChg = btc ? parseFloat(btc.priceChangePercent) : null;
  const fngVal = fng && fng.data ? parseInt(fng.data[0].value) : null;
  const fngLbl = fng && fng.data ? fng.data[0].value_classification : '';
  let fngCls = 'neutral';
  if (fngVal != null) {
    if (fngVal < 20) fngCls = 'good';
    else if (fngVal > 75) fngCls = 'bad';
  }
  el.innerHTML = `
    <div class="kpi">
      <div class="label">BTC 价格</div>
      <div class="value">${btcPrice ? fmtUSD(btcPrice) : '—'}</div>
      <div class="sub ${pctCls(btcChg)}">${btcChg != null ? (btcChg > 0 ? '+' : '') + btcChg.toFixed(2) + '% 24h' : ''}</div>
    </div>
    <div class="kpi ${fngCls}">
      <div class="label">Fear & Greed</div>
      <div class="value">${fngVal ?? '—'}</div>
      <div class="sub">${fngLbl}</div>
    </div>
    <div class="kpi">
      <div class="label">24h High</div>
      <div class="value">${btc ? fmtUSD(parseFloat(btc.highPrice)) : '—'}</div>
    </div>
    <div class="kpi">
      <div class="label">24h Low</div>
      <div class="value">${btc ? fmtUSD(parseFloat(btc.lowPrice)) : '—'}</div>
    </div>`;
}

function renderDCA(dca) {
  const el = document.getElementById('dca-box');
  if (!dca || dca.no_state_file) {
    el.innerHTML = `<div class="empty">
      Daemon 等待首次触发 · 月预算 $2000 未使用<br>
      <a href="/reports/event_dca/" style="color:#58a6ff;font-size:12px">查看完整触发历史 →</a>
    </div>`;
    return;
  }
  const spend = dca.month_spend || 0;
  const count = dca.month_count || 0;
  const pct = Math.min(100, (spend / 2000) * 100);
  const recent = (dca.history || []).slice(-3).reverse();
  const recentRows = recent.length ? recent.map(h => `
    <tr>
      <td>${fmtTime(h.ts)}</td>
      <td style="color:#${h.kind === 'FLASH' ? 'f85149' : h.kind === 'FAST' ? 'f0883e' : h.kind === 'SUSTAIN' ? 'd29922' : '8957e5'}">${h.kind}</td>
      <td>${fmtUSD(h.price)}</td>
      <td>$${Math.round(h.amount_usdt)}</td>
    </tr>`).join('') : '<tr><td colspan="4" style="color:#6e7681;text-align:center">暂无触发历史</td></tr>';
  el.innerHTML = `
    <div style="background:#161b22;border:1px solid #30363d;border-radius:6px;padding:14px 18px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="color:#c9d1d9;font-size:13px">本月 ${dca.month_key}</span>
        <span style="color:#8b949e;font-size:12px">$${Math.round(spend)} / $2000 (${count}/3 次)</span>
      </div>
      <div class="progress"><div class="progress-bar"
        style="width:${pct}%;background:${pct > 80 ? '#f85149' : '#3fb950'}"></div></div>
    </div>
    <table style="margin-top:10px">
      <thead><tr><th>时间</th><th>Kind</th><th>价格</th><th>金额</th></tr></thead>
      <tbody>${recentRows}</tbody>
    </table>`;
}

async function renderWF() {
  // Walk-forward summaries: list *.json from walk_forward_history
  // The http server doesn't auto-index JSON, but reports/walk_forward/ has a generated view.
  // Show a shortcut card pointing there.
  const el = document.getElementById('wf-box');
  el.innerHTML = `
    <div style="background:#161b22;border:1px solid #30363d;border-radius:6px;padding:14px 18px">
      <div style="color:#c9d1d9;font-size:13px;margin-bottom:10px">3 个策略在 8 个市场窗口的表现对比：</div>
      <ul style="list-style:none;padding:0;margin:0">
        <li style="padding:6px 0;border-top:1px solid #21262d">
          <span style="color:#3fb950">HonestTrend15mDry</span>
          · 6/8 profitable · <span style="color:#8b949e">W5 LUNA ❌</span>
        </li>
        <li style="padding:6px 0;border-top:1px solid #21262d">
          <span style="color:#f0883e">HonestTrend1mLive</span>
          · 4/8 profitable · <span style="color:#8b949e">1m 噪音大</span>
        </li>
        <li style="padding:6px 0;border-top:1px solid #21262d">
          <span style="color:#58a6ff">HonestTrendFutures</span>
          · 5/6 profitable · <span style="color:#3fb950">W5 LUNA +48% 🔥</span>
        </li>
      </ul>
      <a href="/reports/walk_forward/"
         style="color:#58a6ff;font-size:12px;display:block;margin-top:10px">查看详细对比图 →</a>
    </div>`;
}

function renderTrades(bots) {
  const el = document.getElementById('trades');
  if (!bots) { el.innerHTML = '<div class="empty">API 失败</div>'; return; }
  const all = [];
  bots.bots.forEach(b => {
    (b.recent_trades || []).slice(0, 5).forEach(t => all.push({ ...t, _bot: b.name, _port: b.port }));
  });
  if (all.length === 0) {
    el.innerHTML = '<div class="empty">所有 bot 都还没开过仓</div>';
    return;
  }
  all.sort((a, b) => (b.open_date || '').localeCompare(a.open_date || ''));
  const rows = all.slice(0, 15).map(t => {
    const pnl = t.close_profit_abs;
    const pnlPct = t.close_profit;
    const pnlCls = pnl > 0 ? 'pos' : (pnl < 0 ? 'neg' : '');
    const isShort = t.is_short ? '🔴 short' : '🟢 long';
    return `<tr>
      <td>${t._bot}</td>
      <td>${t.pair}</td>
      <td>${isShort}</td>
      <td>${fmtTime(t.open_date)}</td>
      <td>${t.close_date ? fmtTime(t.close_date) : '<span style="color:#d29922">open</span>'}</td>
      <td>${t.open_rate ? fmtUSD(t.open_rate) : '—'}</td>
      <td>${t.close_rate ? fmtUSD(t.close_rate) : '—'}</td>
      <td class="${pnlCls}">${pnl != null ? '$' + pnl.toFixed(2) : '—'}</td>
      <td class="${pnlCls}">${pnlPct != null ? (pnlPct * 100).toFixed(2) + '%' : '—'}</td>
      <td>${t.exit_reason || ''}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `<table>
    <thead><tr>
      <th>Bot</th><th>Pair</th><th>方向</th><th>开仓</th><th>平仓</th>
      <th>开价</th><th>平价</th><th>P&L</th><th>%</th><th>Exit</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderEquity(bots) {
  const el = document.getElementById('equity-chart');
  if (!bots || !bots.bots.some(b => b.recent_trades && b.recent_trades.length > 0)) {
    el.innerHTML = '<div class="empty">至少一个 bot 产生交易后，这里会画资金曲线</div>';
    return;
  }
  const traces = [];
  const colors = { 8082: '#3fb950', 8083: '#f0883e', 8084: '#58a6ff' };
  bots.bots.forEach(b => {
    const closed = (b.recent_trades || [])
      .filter(t => !t.is_open && t.close_date)
      .sort((a, c) => (a.close_date || '').localeCompare(c.close_date || ''));
    if (closed.length === 0) return;
    let cum = 0;
    const xs = [], ys = [];
    closed.forEach(t => {
      cum += (t.close_profit_abs || 0);
      xs.push(t.close_date);
      ys.push(cum);
    });
    traces.push({
      x: xs, y: ys, mode: 'lines+markers', name: b.name,
      line: { color: colors[b.port] || '#888', width: 2 },
    });
  });
  if (traces.length === 0) {
    el.innerHTML = '<div class="empty">只有 open trades，没有已平仓的 — 等一笔平仓后画图</div>';
    return;
  }
  Plotly.newPlot(el, traces, {
    template: 'plotly_dark',
    plot_bgcolor: '#0d1117', paper_bgcolor: '#0d1117',
    font: { color: '#c9d1d9' },
    margin: { t: 20, b: 40, l: 60, r: 20 },
    xaxis: { gridcolor: '#21262d' },
    yaxis: { title: '累计 P&L (USDT)', gridcolor: '#21262d' },
    legend: { orientation: 'h', y: 1.1 },
  }, { responsive: true });
}

refresh();
setInterval(refresh, 20000);
</script>
</body>
</html>
