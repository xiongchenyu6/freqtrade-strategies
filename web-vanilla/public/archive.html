<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📦 Backtest Archive · Crypto Quant</title>
<link rel="stylesheet" href="/css/app.css">
<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.35.2/plotly.min.js"></script>
</head>
<body>
<div class="container" style="max-width:1400px">
  <h1>📦 回测档案库</h1>
  <div class="subtitle">
    所有历史回测持久化在 TimescaleDB · 点击行展开 equity 曲线 + trade 明细 ·
    勾 2 行对比
  </div>

  <div class="card" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <label>Strategy</label>
    <select id="strategy"><option value="">All</option></select>
    <label>Sort</label>
    <select id="sort">
      <option value="started_desc">Started ↓</option>
      <option value="profit_desc">Profit % ↓</option>
      <option value="dd_asc">Max DD ↑</option>
      <option value="calmar_desc">Calmar ↓</option>
      <option value="trades_desc">Trades ↓</option>
    </select>
    <span style="margin-left:auto;color:#6e7681;font-size:11px" id="count-badge"></span>
  </div>

  <div class="card" id="compare-bar" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span>已选: <b id="compare-count">0</b> / 2</span>
      <span>
        <button class="btn" onclick="window.__clearCompare()">清空</button>
        <button class="btn primary" onclick="window.__doCompare()" id="cmp-btn" disabled>对比 →</button>
      </span>
    </div>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <table>
      <thead><tr>
        <th style="width:30px"></th>
        <th>Started</th><th>Strategy</th><th>TF</th>
        <th class="num">Trades</th><th class="num">WR%</th>
        <th class="num">Profit%</th><th class="num">Abs</th>
        <th class="num">Max DD%</th><th class="num">Calmar</th>
        <th class="num">Sharpe</th><th>Pairs</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <div class="card" id="detail" style="display:none"></div>
  <div class="card" id="cmp-pane" style="display:none"></div>
</div>

<script type="module">
import { auth } from '/js/auth.js';
import { vps } from '/js/api.js';
import { mountTopbar } from '/js/layout.js';

await auth.init();
mountTopbar('/archive');

let all = [];
let selected = new Set();

async function load() {
  all = await vps.backtestRuns({ limit: 500 });
  document.getElementById('count-badge').textContent = `${all.length} runs`;
  const s = new Set(all.map(r => r.strategy));
  document.getElementById('strategy').innerHTML =
    '<option value="">All</option>' +
    [...s].sort().map(x => `<option>${x}</option>`).join('');
  render();
}

function render() {
  const stratFilter = document.getElementById('strategy').value;
  const sortMode = document.getElementById('sort').value;
  let rows = all.slice();
  if (stratFilter) rows = rows.filter(r => r.strategy === stratFilter);
  rows.sort({
    started_desc: (a,b) => (b.started_at||'').localeCompare(a.started_at||''),
    profit_desc:  (a,b) => (b.total_profit_pct||0) - (a.total_profit_pct||0),
    dd_asc:       (a,b) => (a.max_drawdown_pct||99) - (b.max_drawdown_pct||99),
    calmar_desc:  (a,b) => (b.calmar||-99) - (a.calmar||-99),
    trades_desc:  (a,b) => (b.total_trades||0) - (a.total_trades||0),
  }[sortMode]);

  const tbody = document.getElementById('rows');
  tbody.innerHTML = rows.map(r => {
    const pp = r.total_profit_pct||0, dd = r.max_drawdown_pct||0;
    const pairs = (r.pairs||[]).slice(0,3).map(p => `<span class="pill">${p}</span>`).join('');
    return `<tr data-id="${r.id}" style="cursor:pointer">
      <td><input type="checkbox" ${selected.has(r.id)?'checked':''}
           onchange="window.__toggle(${r.id}, this)" onclick="event.stopPropagation()"></td>
      <td class="meta">${(r.started_at||'').replace('T',' ').slice(0,16)}</td>
      <td><b>${r.strategy}</b></td>
      <td>${r.timeframe||'-'}</td>
      <td class="num">${r.total_trades||0}</td>
      <td class="num">${(r.win_rate_pct??0).toFixed(1)}</td>
      <td class="num ${pp>0?'pos':'neg'}">${pp.toFixed(2)}</td>
      <td class="num ${pp>0?'pos':'neg'}">$${(r.total_profit_abs||0).toFixed(0)}</td>
      <td class="num ${dd>20?'neg':''}">${dd.toFixed(2)}</td>
      <td class="num">${r.calmar!=null?r.calmar.toFixed(2):'-'}</td>
      <td class="num">${r.sharpe!=null?r.sharpe.toFixed(2):'-'}</td>
      <td>${pairs}</td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('tr').forEach(tr =>
    tr.addEventListener('click', () => showDetail(parseInt(tr.dataset.id))));
}

window.__toggle = (id, cb) => {
  if (cb.checked) {
    if (selected.size >= 2) { cb.checked = false; return; }
    selected.add(id);
  } else selected.delete(id);
  const bar = document.getElementById('compare-bar');
  bar.style.display = selected.size > 0 ? 'block' : 'none';
  document.getElementById('compare-count').textContent = selected.size;
  document.getElementById('cmp-btn').disabled = selected.size !== 2;
};
window.__clearCompare = () => {
  selected.clear();
  document.getElementById('compare-bar').style.display = 'none';
  document.getElementById('cmp-pane').style.display = 'none';
  render();
};

async function showDetail(id) {
  document.getElementById('cmp-pane').style.display = 'none';
  const el = document.getElementById('detail');
  el.style.display = 'block';
  el.innerHTML = '<div style="color:#8b949e">加载中…</div>';
  try {
    const trades = await vps.backtestTrades(id);
    const run = all.find(r => r.id === id);
    let eq = 0;
    const pts = trades.map(t => {
      eq += t.profit_abs || 0;
      return { x: t.close_date || t.open_date, y: eq };
    });
    el.innerHTML = `
      <h3 style="color:#f0f6fc;margin:0 0 10px">${run.strategy} · run #${id}</h3>
      <div style="color:#8b949e;font-size:12px;margin-bottom:10px">
        Started ${(run.started_at||'').slice(0,16)} · ${run.total_trades} trades ·
        Profit ${(run.total_profit_pct||0).toFixed(2)}% · Max DD ${(run.max_drawdown_pct||0).toFixed(2)}%
      </div>
      <div id="eq-chart" style="height:300px"></div>
      <h4 style="color:#f0f6fc;margin:14px 0 6px;font-size:13px">前 30 笔</h4>
      <table><thead><tr>
        <th>#</th><th>Pair</th><th>Dir</th><th>Open</th><th>Close</th>
        <th class="num">Open$</th><th class="num">Close$</th>
        <th class="num">P&L</th><th class="num">%</th><th>Exit</th>
      </tr></thead><tbody>${trades.slice(0,30).map(t => {
        const cls = t.profit_abs > 0 ? 'pos' : 'neg';
        return `<tr>
          <td>${t.trade_id}</td><td>${t.pair}</td>
          <td>${t.is_short?'🔴S':'🟢L'}</td>
          <td class="meta">${(t.open_date||'').replace('T',' ').slice(0,16)}</td>
          <td class="meta">${(t.close_date||'').replace('T',' ').slice(0,16)}</td>
          <td class="num">${(+t.open_rate||0).toFixed(2)}</td>
          <td class="num">${(+t.close_rate||0).toFixed(2)}</td>
          <td class="num ${cls}">$${(+t.profit_abs||0).toFixed(2)}</td>
          <td class="num ${cls}">${(+t.profit_pct||0).toFixed(2)}%</td>
          <td>${t.exit_reason||''}</td>
        </tr>`;
      }).join('')}</tbody></table>
    `;
    Plotly.newPlot('eq-chart', [{
      x: pts.map(p=>p.x), y: pts.map(p=>p.y),
      mode: 'lines', fill: 'tozeroy',
      line: { color: '#58a6ff', width: 2 },
    }], {
      template: 'plotly_dark',
      plot_bgcolor: '#0d1117', paper_bgcolor: '#161b22',
      font: { color: '#c9d1d9' },
      margin: { t: 10, b: 40, l: 60, r: 10 },
      xaxis: { type: 'date', gridcolor: '#21262d' },
      yaxis: { title: 'Cum P&L', gridcolor: '#21262d' },
    }, { responsive: true });
  } catch (e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

window.__doCompare = async () => {
  const ids = [...selected];
  const el = document.getElementById('cmp-pane');
  document.getElementById('detail').style.display = 'none';
  el.style.display = 'block';
  el.innerHTML = '<div style="color:#8b949e">加载中…</div>';
  const [runs, trades] = await Promise.all([
    ids.map(id => all.find(r => r.id === id)),
    Promise.all(ids.map(id => vps.backtestTrades(id))),
  ]);
  const colors = ['#58a6ff', '#f0883e'];
  const cards = runs.map((r, i) => `
    <div class="kpi" style="border-left-color:${colors[i]}">
      <div class="label">#${r.id} · ${r.strategy}</div>
      <div class="value" style="font-size:14px">
        ${(r.total_profit_pct||0).toFixed(2)}%
        / DD ${(r.max_drawdown_pct||0).toFixed(2)}%
      </div>
    </div>
  `).join('');
  const traces = trades.map((tr, i) => {
    let eq = 0;
    const pts = tr.map(t => { eq += t.profit_abs||0; return { x: t.close_date||t.open_date, y: eq }; });
    return {
      x: pts.map(p=>p.x), y: pts.map(p=>p.y),
      mode: 'lines', name: `#${ids[i]}`,
      line: { color: colors[i], width: 2 },
    };
  });
  el.innerHTML = `
    <h3 style="color:#f0f6fc;margin:0 0 10px">对比 #${ids[0]} vs #${ids[1]}</h3>
    <div class="grid" style="margin-bottom:14px">${cards}</div>
    <div id="cmp-chart" style="height:380px"></div>
  `;
  Plotly.newPlot('cmp-chart', traces, {
    template: 'plotly_dark',
    plot_bgcolor: '#0d1117', paper_bgcolor: '#161b22',
    font: { color: '#c9d1d9' },
    margin: { t: 20, b: 40, l: 60, r: 20 },
    xaxis: { type: 'date', gridcolor: '#21262d' },
    yaxis: { title: 'Cum P&L', gridcolor: '#21262d' },
    legend: { orientation: 'h', y: 1.1 },
  }, { responsive: true });
};

document.getElementById('strategy').addEventListener('change', render);
document.getElementById('sort').addEventListener('change', render);

load();
</script>
</body>
</html>
