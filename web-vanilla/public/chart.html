<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📉 Multi-Granularity Chart · Crypto Quant</title>
<link rel="stylesheet" href="/css/app.css">
<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.35.2/plotly.min.js"></script>
</head>
<body>
<div class="container" style="max-width:1400px">
  <h1>📉 Multi-Granularity OHLC</h1>
  <div class="subtitle">
    客户端按时间跨度自动选 <code>ohlc_15m</code> / <code>ohlc_1h</code> / <code>ohlc_1d</code>
    —— 无论看 1 天还是 8 年，永远 ~2000 点，Plotly 流畅渲染。
  </div>

  <div class="card" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <label>Pair</label>
    <select id="pair"></select>
    <label>Range</label>
    <button class="btn" data-range="7d">7D</button>
    <button class="btn" data-range="30d">30D</button>
    <button class="btn" data-range="90d">90D</button>
    <button class="btn primary" data-range="1y">1Y</button>
    <button class="btn" data-range="5y">5Y</button>
    <button class="btn" data-range="all">All</button>
    <label style="margin-left:auto">叠加回测</label>
    <select id="run" style="min-width:280px">
      <option value="">无（只看 K 线）</option>
    </select>
  </div>

  <div class="card" style="padding:10px 14px;font-family:ui-monospace,monospace;font-size:11px;color:#8b949e" id="meta">
    <span>loading…</span>
  </div>

  <div id="chart" style="background:#161b22;border:1px solid #30363d;border-radius:6px;padding:6px;height:560px"></div>

  <div id="stats" class="grid" style="margin-top:14px"></div>
</div>

<script type="module">
import { auth } from '/js/auth.js';
import { vps } from '/js/api.js';
import { mountTopbar } from '/js/layout.js';

await auth.init();
mountTopbar('/chart');

let state = {
  pair:  'BTC/USDT',
  range: '1y',
  runId: '',
};

const RANGE = {
  '7d':  () => [new Date(Date.now() - 7 * 86400e3), new Date()],
  '30d': () => [new Date(Date.now() - 30 * 86400e3), new Date()],
  '90d': () => [new Date(Date.now() - 90 * 86400e3), new Date()],
  '1y':  () => [new Date(Date.now() - 365 * 86400e3), new Date()],
  '5y':  () => [new Date(Date.now() - 5 * 365 * 86400e3), new Date()],
  'all': () => [new Date('2017-08-17T00:00:00Z'), new Date()],
};

async function init() {
  // Populate pair selector from API views (unique pairs from daily aggregate)
  try {
    const daily = await vps.ohlcDaily('BTC/USDT', { limit: 1 });
    // pair list endpoint would be better; for now hardcode the pairs we loaded
    const pairs = ['BTC/USDT', 'ETH/USDT', 'BNB/USDT', 'SOL/USDT', 'XRP/USDT', 'DOGE/USDT'];
    document.getElementById('pair').innerHTML =
      pairs.map(p => `<option${p === state.pair ? ' selected':''}>${p}</option>`).join('');
  } catch {
    // If API down, pair selector empty
  }
  // Populate run selector
  try {
    const runs = await vps.backtestRuns({ limit: 50 });
    document.getElementById('run').innerHTML += runs.map(r =>
      `<option value="${r.id}">#${r.id} ${r.strategy} · ${r.total_trades}t · ${(r.total_profit_pct || 0).toFixed(1)}%</option>`
    ).join('');
  } catch {}
  refresh();
}

async function refresh() {
  const t0 = performance.now();
  const [from, to] = RANGE[state.range]();
  const rows = await vps.ohlcAuto(state.pair, { from, to, maxPoints: 2000 });
  const ms = (performance.now() - t0).toFixed(0);
  document.getElementById('meta').innerHTML = `
    <b>Pair:</b> ${state.pair} &nbsp;
    <b>Source:</b> ${rows._table || '?'} &nbsp;
    <b>Rows:</b> ${rows.length} &nbsp;
    <b>Load:</b> ${ms} ms &nbsp;
    <b>From:</b> ${from.toISOString().slice(0,16)} &nbsp;
    <b>To:</b> ${to.toISOString().slice(0,16)}
  `;

  const traces = [{
    x:     rows.map(r => r.bucket),
    open:  rows.map(r => r.open),
    high:  rows.map(r => r.high),
    low:   rows.map(r => r.low),
    close: rows.map(r => r.close),
    type: 'candlestick',
    name: state.pair,
    increasing: { line: { color: '#3fb950' } },
    decreasing: { line: { color: '#f85149' } },
    showlegend: false,
  }];

  if (state.runId) {
    try {
      const trades = (await vps.backtestTrades(state.runId))
        .filter(t => t.pair === state.pair);
      const winners = trades.filter(t => (t.profit_abs || 0) > 0);
      const losers  = trades.filter(t => (t.profit_abs || 0) <= 0);

      const mk = (arr, name, color, which) => ({
        type: 'scatter', mode: 'markers', name,
        x: arr.map(t => t[which]),
        y: arr.map(t => t[which === 'open_date' ? 'open_rate' : 'close_rate']),
        text: arr.map(t =>
          `${t.is_short ? 'SHORT' : 'LONG'} · $${(t.profit_abs||0).toFixed(2)} ` +
          `(${(t.profit_pct||0).toFixed(2)}%) · ${t.exit_reason || ''}`),
        hovertemplate: '<b>%{x}</b><br>$%{y:,.0f}<br>%{text}<extra>' + name + '</extra>',
        marker: {
          size: 9, color,
          symbol: which === 'open_date' ? 'triangle-up' : 'triangle-down',
          line: { width: 1, color: '#0d1117' },
        },
      });
      traces.push(mk(trades,  '进场',          '#d29922', 'open_date'));
      traces.push(mk(winners, '🟢 winners 出', '#3fb950', 'close_date'));
      traces.push(mk(losers,  '🔴 losers 出',  '#f85149', 'close_date'));

      document.getElementById('stats').innerHTML = `
        <div class="kpi">
          <div class="label">此 pair 交易数</div>
          <div class="value">${trades.length}</div>
        </div>
        <div class="kpi ${winners.length > losers.length ? 'good' : 'bad'}">
          <div class="label">胜率</div>
          <div class="value">${trades.length ? (100 * winners.length / trades.length).toFixed(1) + '%' : '-'}</div>
        </div>
        <div class="kpi">
          <div class="label">累计 P&L</div>
          <div class="value">$${trades.reduce((a, t) => a + (t.profit_abs || 0), 0).toFixed(0)}</div>
        </div>
      `;
    } catch (e) {
      console.warn(e);
    }
  } else {
    document.getElementById('stats').innerHTML = '';
  }

  Plotly.newPlot('chart', traces, {
    template: 'plotly_dark',
    plot_bgcolor: '#0d1117', paper_bgcolor: '#161b22',
    font: { color: '#c9d1d9' },
    margin: { t: 10, b: 40, l: 60, r: 20 },
    xaxis: { type: 'date', gridcolor: '#21262d', rangeslider: { visible: false } },
    yaxis: { type: 'log', gridcolor: '#21262d', title: 'USDT' },
    legend: { orientation: 'h', y: 1.05 },
  }, { responsive: true, displaylogo: false });
}

document.querySelectorAll('.btn[data-range]').forEach(b =>
  b.addEventListener('click', () => {
    document.querySelectorAll('.btn[data-range]').forEach(x => x.classList.remove('primary'));
    b.classList.add('primary');
    state.range = b.dataset.range;
    refresh();
  }));
document.getElementById('pair').addEventListener('change', e => {
  state.pair = e.target.value; refresh();
});
document.getElementById('run').addEventListener('change', e => {
  state.runId = e.target.value; refresh();
});

init();
</script>
</body>
</html>
