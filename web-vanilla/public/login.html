<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 · Crypto Quant</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="container" style="max-width:420px;padding-top:80px">
  <h1>登录 / 注册</h1>
  <div class="subtitle">
    Auth 由 <code>auth.panda.qzz.io</code>（GoTrue）托管 · 同一 JWT 直连 VPS PostgREST。
  </div>

  <form id="form" class="card" style="padding:20px">
    <div style="margin-bottom:12px">
      <label style="display:block;color:#8b949e;font-size:12px;margin-bottom:4px">邮箱</label>
      <input id="email" type="email" required style="width:100%">
    </div>
    <div style="margin-bottom:16px">
      <label style="display:block;color:#8b949e;font-size:12px;margin-bottom:4px">密码（≥8 位）</label>
      <input id="password" type="password" minlength="8" required style="width:100%">
    </div>
    <div style="display:flex;gap:8px">
      <button type="submit" class="btn primary" id="login-btn">登录</button>
      <button type="button" class="btn" id="signup-btn">注册</button>
      <button type="button" class="btn" id="magic-btn">魔法链接</button>
    </div>
    <div id="status" style="margin-top:12px;font-size:12px"></div>
  </form>

  <p style="margin-top:18px;color:#6e7681;font-size:12px">
    未登录也能浏览大多数内容（基于 <code>api_anon</code> 角色）。
    登录后走你自己的 role，未来可以解锁个人化视图。
  </p>
</div>

<script type="module">
import { auth } from '/js/auth.js';
import { mountTopbar } from '/js/layout.js';

await auth.init();
mountTopbar('/login');

if (auth.user) window.location.href = '/';

const statusEl = document.getElementById('status');
function set(msg, kind = '') {
  statusEl.textContent = msg;
  statusEl.style.color = kind === 'err' ? '#f85149'
                       : kind === 'ok'  ? '#3fb950'
                       : '#8b949e';
}

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  set('登录中…');
  try {
    await auth.login(email.value, password.value);
    set('✓ 登录成功，跳转…', 'ok');
    setTimeout(() => window.location.href = '/', 500);
  } catch (err) {
    set('登录失败: ' + err.message, 'err');
  }
});

document.getElementById('signup-btn').addEventListener('click', async () => {
  if (!email.value || password.value.length < 8) {
    set('填邮箱和 ≥8 位密码', 'err'); return;
  }
  set('注册中…');
  try {
    await auth.signup(email.value, password.value);
    set('✓ 注册成功', 'ok');
    setTimeout(() => window.location.href = '/', 500);
  } catch (err) {
    set('注册失败: ' + err.message, 'err');
  }
});

document.getElementById('magic-btn').addEventListener('click', async () => {
  if (!email.value) { set('先填邮箱', 'err'); return; }
  set('发送中…');
  try {
    await auth.signupMagicLink(email.value);
    set('✓ 登录链接已发到邮箱（若已启用邮件）', 'ok');
  } catch (err) {
    set('失败: ' + err.message, 'err');
  }
});
</script>
</body>
</html>
